services:
  rustfs:
    image: dllhb/rustfs-non-root:2.0.0
    container_name: rustfs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_VOLUMES: /data
      RUSTFS_LOG_LEVEL: info
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_OBS_ENVIRONMENT: local
      RUSTFS_SINKS_FILE_PATH: /logs
      RUSTFS_OBS_LOG_DIRECTORY: /logs
    command: ["/usr/bin/rustfs"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./rustfs/data:/data
      - ./rustfs/logs:/logs

  nessie:
    image: ghcr.io/projectnessie/nessie:${NESSIE_VERSION}
    container_name: nessie
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    ports:
      - "19120:19120"

  trino:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino
    restart: unless-stopped
    depends_on:
      - rustfs
      - nessie
    ports:
      - "8080:8080"
    volumes:
      - ./trino/config.properties:/etc/trino/config.properties:ro
      - ./trino/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/node.properties:/etc/trino/node.properties:ro
      - ./trino/catalog:/etc/trino/catalog:ro

  postgres:
    image: postgres:16
    container_name: kestra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  kestra:
    image: kestra/kestra:${KESTRA_VERSION}
    container_name: kestra
    restart: unless-stopped
    depends_on:
      - postgres
    command: server standalone
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          server:
            basicAuth:
              enabled: false
    ports:
      - "8081:8080"
    volumes:
      - ./kestra/storage:/app/storage

  meltano:
    image: meltano/meltano:${MELTANO_IMAGE_TAG}
    container_name: meltano
    restart: unless-stopped
    working_dir: /project
    command: tail -f /dev/null
    environment:
      MELTANO_PROJECT_READONLY: "false"
    volumes:
      - ./meltano:/project

networks:
  default:
    name: oss-data-stack
